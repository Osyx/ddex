name: Bug Report
description: Report something that is not working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you file this issue
      options:
        - label: I have searched the existing issues and this has not been reported yet.
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to trigger the bug.
      placeholder: |
        1. Run `ddex words ~/Downloads/package.zip --top 20`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error output or stack traces.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux x64
        - Linux ARM64
        - macOS Intel (x64)
        - macOS Apple Silicon (ARM64)
        - Windows x64
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      description: e.g. Ubuntu 24.04, macOS 15.3, Windows 11 24H2
    validations:
      required: true

  - type: input
    id: tool_version
    attributes:
      label: ddex version
      description: Run `ddex --help` to see the version, or check the binary filename from the releases page.
      placeholder: e.g. 1.2.0
